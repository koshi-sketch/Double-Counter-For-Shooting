<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Double Count">
  <title>Double Count</title>
  <link rel="manifest" href="manifest.json">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400&family=Noto+Sans+JP:wght@300&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --warn: #ef9f27;
      --danger: #e24b4a;
    }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* ── 全体レイアウト ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
    }

    .section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      /* パディングはここだけで管理 */
      padding: 20px 20px;
    }

    .divider { border: none; border-top: 0.5px solid #555; width: 100%; }

    /* ── ラベル ── */
    .label {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.28em;
      color: #bbb;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* ── 時間表示 ── */
    .time {
      font-family: 'Roboto Mono', monospace;
      font-weight: 300;
      font-size: 72px;
      letter-spacing: -0.02em;
      line-height: 1;
      transition: color 0.35s;
      color: #fff;
    }
    .time.stopped { color: #444; }
    .time.warn    { color: var(--warn); text-shadow: 0 0 30px rgba(239,159,39,0.6), 0 0 60px rgba(239,159,39,0.3); }
    .time.danger  { color: var(--danger); text-shadow: 0 0 30px rgba(226,75,74,0.7), 0 0 60px rgba(226,75,74,0.4), 0 0 2px #fff, 0 0 6px #fff, 0 0 12px #fff; }

    /* ── プログレスバー ── */
    .bar-wrap {
      width: 100%;
      height: 1px;
      background: #333;
      margin: 16px 0 14px;
    }
    .bar {
      height: 100%;
      background: #888;
      transition: width 0.6s linear, background 0.35s;
    }
    .bar.warn   { background: var(--warn); }
    .bar.danger { background: var(--danger); }

    /* ── +/− ボタングリッド ──
       align-self: stretch で親幅いっぱいに広げる
       grid自体はそこから4等分 */
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      align-self: stretch;   /* ← これが重要 */
      margin-bottom: 10px;
    }
    .btn-add {
      background: none;
      border: 0.5px solid #666;
      color: #ccc;
      font-family: 'Roboto Mono', monospace;
      font-weight: 300;
      font-size: 12px;
      padding: 12px 0;
      border-radius: 3px;
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s, transform 0.08s;
    }
    .btn-add.minus { color: #ccc; border-color: #666; }
    .btn-add.minus:active { color: #fff; border-color: #aaa; transform: scale(0.93); }
    .btn-add.plus:active  { color: #fff; border-color: #aaa; transform: scale(0.93); }

    /* ── START / RESET ── */
    .row {
      display: flex;
      gap: 10px;
      align-self: stretch;   /* ← これも重要 */
    }
    .btn-main {
      flex: 1;
      background: #fff;
      color: #000;
      border: 0.5px solid transparent;
      font-family: 'Roboto Mono', monospace;
      font-weight: 400;
      font-size: 14px;
      letter-spacing: 0.2em;
      padding: 17px;
      border-radius: 3px;
      cursor: pointer;
      transition: transform 0.08s, background 0.2s, color 0.2s, border-color 0.2s;
    }
    .btn-main.active {
      background: transparent;
      color: var(--danger);
      border-color: var(--danger);
    }
    .btn-main:active { transform: scale(0.95); }

    .btn-sub {
      flex: 1;
      background: none;
      color: #ccc;
      border: 0.5px solid #666;
      font-family: 'Roboto Mono', monospace;
      font-weight: 300;
      font-size: 14px;
      letter-spacing: 0.2em;
      padding: 17px;
      border-radius: 3px;
      cursor: pointer;
      transition: transform 0.08s, color 0.12s;
    }
    .btn-sub:active { transform: scale(0.95); color: #fff; }

    @keyframes pulse-warn {
      0%, 100% { background: #000; }
      50% { background: #1a0f00; }
    }
    .section.warn-bg   { animation: pulse-warn 1s ease-in-out infinite; }
    .section.danger-bg { background: #1a0000; }
    .status-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #333;
      margin-top: 14px;
      transition: background 0.3s;
    }
    .status-dot.standby { background: #444; }
    .status-dot.ready   { background: #fff; }
    .status-dot.warn    { background: var(--warn); }

    /* ── 時間入力モーダル ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.97);
      align-items: center;
      justify-content: center;
      z-index: 200;
      flex-direction: column;
      gap: 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal-hint {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 11px;
      color: #555;
      letter-spacing: 0.2em;
    }
    .modal-time-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .modal-field {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .modal-field-label {
      font-family: 'Roboto Mono', monospace;
      font-size: 11px;
      color: #444;
      letter-spacing: 0.18em;
    }
    .modal-val {
      font-family: 'Roboto Mono', monospace;
      font-weight: 300;
      font-size: 64px;
      letter-spacing: -0.02em;
      line-height: 1;
      min-width: 110px;
      text-align: center;
      padding: 10px 8px;
      border-radius: 4px;
      border: 0.5px solid #2a2a2a;
      transition: border-color 0.2s, color 0.2s;
      color: #444;
    }
    .modal-val.active { border-color: #fff; color: #fff; }
    .modal-colon {
      font-family: 'Roboto Mono', monospace;
      font-size: 48px;
      font-weight: 300;
      color: #333;
      padding-bottom: 8px;
    }
    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 260px;
    }
    .np-btn {
      background: #111;
      border: 0.5px solid #2a2a2a;
      color: #ccc;
      font-family: 'Roboto Mono', monospace;
      font-weight: 300;
      font-size: 22px;
      padding: 18px;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.08s, transform 0.06s;
    }
    .np-btn:active { background: #222; transform: scale(0.93); }
    .np-btn.del    { color: #888; font-size: 18px; }
    .np-btn.ok     { background: #fff; color: #000; font-size: 14px; letter-spacing: 0.15em; }
    .np-btn.ok:active { background: #ddd; }
    .np-btn.cancel { color: #555; font-size: 14px; letter-spacing: 0.1em; }

    /* ── インストールバナー ── */
    #install-banner {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #0a0a0a;
      border-top: 0.5px solid #333;
      padding: 14px 20px;
      align-items: center;
      gap: 12px;
      z-index: 100;
    }
    #install-banner p {
      flex: 1;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 11px;
      font-weight: 300;
      color: #555;
    }
    .btn-install {
      background: #fff; color: #000; border: none;
      font-family: 'Roboto Mono', monospace;
      font-size: 11px; letter-spacing: 0.1em;
      padding: 9px 16px; border-radius: 3px; cursor: pointer;
    }
    .btn-close {
      background: none; border: none; color: #3a3a3a;
      font-size: 18px; cursor: pointer; padding: 4px;
    }
  </style>
</head>
<body>

<div class="app">

  <!-- STOPWATCH -->
  <div class="section">
    <div class="label">stopwatch</div>
    <div class="time stopped" id="cu-time">00:00:00</div>
    <div class="row" style="margin-top:24px;">
      <button class="btn-main" id="cu-btn" onclick="toggleCU()">start</button>
      <button class="btn-sub" onclick="resetCU()">reset</button>
    </div>
  </div>

  <hr class="divider">

  <!-- COUNTDOWN -->
  <div class="section">
    <div class="label">countdown</div>
    <div class="time stopped" id="cd-time"
         style="font-size:min(26vw,130px);letter-spacing:-0.03em;cursor:pointer;"
         onclick="openModal()">00:45</div>

    <div class="bar-wrap">
      <div class="bar" id="bar" style="width:100%"></div>
    </div>

    <div class="btn-grid">
      <button class="btn-add minus" onclick="addTime(-5)">−5</button>
      <button class="btn-add minus" onclick="addTime(-10)">−10</button>
      <button class="btn-add minus" onclick="addTime(-30)">−30</button>
      <button class="btn-add minus" onclick="addTime(-60)">−1m</button>
      <button class="btn-add plus"  onclick="addTime(5)">+5</button>
      <button class="btn-add plus"  onclick="addTime(10)">+10</button>
      <button class="btn-add plus"  onclick="addTime(30)">+30</button>
      <button class="btn-add plus"  onclick="addTime(60)">+1m</button>
    </div>

    <div class="row">
      <button class="btn-main" id="cd-btn" onclick="toggleCD()">start</button>
      <button class="btn-sub" onclick="resetCD()">reset</button>
    </div>

    <div class="status-dot standby" id="status-dot"></div>
  </div>

</div>

<!-- 時間入力モーダル -->
<div class="modal-overlay" id="modal">
  <div class="modal-hint">時間を入力してください</div>
  <div class="modal-time-row">
    <div class="modal-field">
      <div class="modal-val active" id="modal-min" onclick="setFocus('min')">00</div>
      <div class="modal-field-label">min</div>
    </div>
    <div class="modal-colon">:</div>
    <div class="modal-field">
      <div class="modal-val" id="modal-sec" onclick="setFocus('sec')">00</div>
      <div class="modal-field-label">sec</div>
    </div>
  </div>
  <div class="numpad">
    <button class="np-btn" onclick="npDigit(1)">1</button>
    <button class="np-btn" onclick="npDigit(2)">2</button>
    <button class="np-btn" onclick="npDigit(3)">3</button>
    <button class="np-btn" onclick="npDigit(4)">4</button>
    <button class="np-btn" onclick="npDigit(5)">5</button>
    <button class="np-btn" onclick="npDigit(6)">6</button>
    <button class="np-btn" onclick="npDigit(7)">7</button>
    <button class="np-btn" onclick="npDigit(8)">8</button>
    <button class="np-btn" onclick="npDigit(9)">9</button>
    <button class="np-btn cancel" onclick="closeModal()">cancel</button>
    <button class="np-btn" onclick="npDigit(0)">0</button>
    <button class="np-btn del" onclick="npDel()">⌫</button>
  </div>
  <button class="np-btn ok" style="width:260px;margin-top:4px;" onclick="npConfirm()">set</button>
</div>

<div id="install-banner">
  <p>ホーム画面に追加してオフラインで使えます</p>
  <button class="btn-install" onclick="installApp()">追加</button>
  <button class="btn-close" onclick="closeBanner()">×</button>
</div>

<script>
let cuSec = 0, cuRun = false, cuT = null;
let cdSec = 45, cdInit = 45, cdRun = false, cdT = null;
let deferredPrompt = null;

const pad = n => String(n).padStart(2, '0');
const fmtUp   = s => [Math.floor(s/3600), Math.floor((s%3600)/60), s%60].map(pad).join(':');
const fmtDown = s => [Math.floor(s/60), s%60].map(pad).join(':');

// ── AUDIO ──
let actx = null;
function getCtx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  return actx;
}
function tone(freq, dur, vol=0.3, type='sine', delay=0) {
  try {
    const ctx = getCtx();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type; o.frequency.value = freq;
    const t = ctx.currentTime + delay;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur);
  } catch(e) {}
}
function playStart() {
  tone(1568, 0.12, 0.8, 'sine', 0);
  tone(2093, 0.3,  0.7, 'sine', 0.11);
}
function playTick() { tone(1400, 0.06, 0.15, 'square', 0); }
function playEnd() {
  tone(1318, 0.15, 0.8, 'sine', 0);
  tone(880,  0.5,  0.7, 'sine', 0.13);
}

// ── STOPWATCH ──
function toggleCU() {
  cuRun = !cuRun;
  const btn = document.getElementById('cu-btn');
  btn.textContent = cuRun ? 'stop' : 'start';
  btn.classList.toggle('active', cuRun);
  if (cuRun) {
    document.getElementById('cu-time').classList.remove('stopped');
    cuT = setInterval(() => {
      cuSec++;
      document.getElementById('cu-time').textContent = fmtUp(cuSec);
    }, 1000);
  } else {
    clearInterval(cuT);
  }
}
function resetCU() {
  clearInterval(cuT); cuRun = false; cuSec = 0;
  document.getElementById('cu-btn').textContent = 'start';
  document.getElementById('cu-btn').classList.remove('active');
  const el = document.getElementById('cu-time');
  el.className = 'time stopped';
  el.textContent = fmtUp(0);
}

// ── COUNTDOWN ──
function updateCD() {
  const el  = document.getElementById('cd-time');
  const bar = document.getElementById('bar');
  const dot = document.getElementById('status-dot');
  const sec = document.querySelectorAll('.section')[1];
  el.textContent = fmtDown(cdSec);
  const ratio = cdInit > 0 ? cdSec / cdInit : 0;
  bar.style.width = (ratio * 100) + '%';
  el.className = 'time';
  bar.className = 'bar';
  dot.className = 'status-dot';
  sec.className = 'section';
  if (cdSec <= 0) {
    el.classList.add('danger'); bar.classList.add('danger'); dot.classList.add('warn');
    sec.classList.add('danger-bg');
  } else if (cdRun && cdSec <= 5) {
    el.classList.add('warn'); bar.classList.add('warn'); dot.classList.add('standby');
    sec.classList.add('warn-bg');
  } else if (!cdRun) {
    el.classList.add('stopped');
    dot.classList.add(cdSec < cdInit ? 'ready' : 'standby');
  } else {
    dot.classList.add('standby');
  }
}
function toggleCD() {
  if (cdSec <= 0) {
    cdSec = cdInit;
    updateCD();
  }
  cdRun = !cdRun;
  const btn = document.getElementById('cd-btn');
  btn.textContent = cdRun ? 'stop' : 'start';
  btn.classList.toggle('active', cdRun);
  if (cdRun) { playStart(); cdT = setInterval(tickCD, 1000); }
  else { clearInterval(cdT); }
  updateCD();
}
function tickCD() {
  if (cdSec <= 1) {
    cdSec = 0;
    clearInterval(cdT); cdRun = false;
    document.getElementById('cd-btn').textContent = 'start';
    document.getElementById('cd-btn').classList.remove('active');
    updateCD();
    playEnd();
  } else {
    cdSec--;
    if (cdSec <= 5) playTick();
    updateCD();
  }
}
function resetCD() {
  clearInterval(cdT); cdRun = false; cdSec = cdInit;
  document.getElementById('cd-btn').textContent = 'start';
  document.getElementById('cd-btn').classList.remove('active');
  updateCD();
}
function addTime(s) {
  if (!cdRun) { cdSec = Math.max(0, cdSec + s); cdInit = cdSec; updateCD(); }
}

// ── MODAL ──
let npFocus = 'min', npMin = '', npSec = '';
function openModal() {
  if (cdRun) return;
  npFocus = 'min'; npMin = ''; npSec = '';
  updateModalDisplay();
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function setFocus(f) { npFocus = f; updateModalDisplay(); }
function updateModalDisplay() {
  const mEl = document.getElementById('modal-min');
  const sEl = document.getElementById('modal-sec');
  mEl.textContent = npMin === '' ? '00' : pad(parseInt(npMin, 10));
  sEl.textContent = npSec === '' ? '00' : pad(Math.min(59, parseInt(npSec, 10)));
  mEl.className = 'modal-val' + (npFocus === 'min' ? ' active' : '');
  sEl.className = 'modal-val' + (npFocus === 'sec' ? ' active' : '');
}
function npDigit(d) {
  if (npFocus === 'min') {
    if (npMin.length >= 2) return;
    npMin += String(d);
    if (npMin.length === 2) npFocus = 'sec';
  } else {
    if (npSec.length >= 2) return;
    npSec += String(d);
  }
  updateModalDisplay();
}
function npDel() {
  if (npFocus === 'sec') {
    if (npSec.length > 0) npSec = npSec.slice(0,-1);
    else { npFocus = 'min'; npMin = npMin.slice(0,-1); }
  } else {
    npMin = npMin.slice(0,-1);
  }
  updateModalDisplay();
}
function npConfirm() {
  const m = npMin === '' ? 0 : parseInt(npMin, 10);
  const s = npSec === '' ? 0 : Math.min(59, parseInt(npSec, 10));
  cdSec = m * 60 + s; cdInit = cdSec;
  updateCD(); closeModal();
}

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}

// ── INSTALL ──
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'flex';
});
function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => { deferredPrompt = null; closeBanner(); });
  }
}
function closeBanner() { document.getElementById('install-banner').style.display = 'none'; }

updateCD();
</script>
</body>
</html>
